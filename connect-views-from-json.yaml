AWSTemplateFormatVersion: '2010-09-09'
Description: 'Create Connect Views using CLI with JSON files'

Parameters:
  ConnectInstanceArn:
    Type: String
    Description: Amazon Connect Instance ARN

Resources:
  ViewCreatorKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for ViewCreator Lambda and SQS encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM policies
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow Lambda to use the key
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:DescribeKey'
            Resource: '*'
          - Sid: Allow SQS to use the key
            Effect: Allow
            Principal:
              Service: sqs.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'

  ViewCreatorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'view-creator-dlq-${AWS::StackName}'
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 300
      KmsMasterKeyId: !GetAtt ViewCreatorKMSKey.Arn

  ViewCreatorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub 
            - 'ConnectViewPolicy-${UUID}'
            - UUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - connect:CreateView
                  - connect:DeleteView
                Resource: !Sub "${ConnectInstanceArn}/*"
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt ViewCreatorDLQ.Arn

  ViewCreatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt ViewCreatorRole.Arn
      ReservedConcurrentExecutions: 5
      DeadLetterConfig:
        TargetArn: !GetAtt ViewCreatorDLQ.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import json
          import cfnresponse
          
          def handler(event, context):
              try:
                  connect = boto3.client('connect')
                  instance_id = event['ResourceProperties']['InstanceId']
                  
                  if event['RequestType'] == 'Create':
                      # Parse content JSON
                      content = json.loads(event['ResourceProperties']['Content'])
                      
                      response = connect.create_view(
                          InstanceId=instance_id,
                          Name=event['ResourceProperties']['Name'],
                          Status='PUBLISHED',
                          Content=content
                      )
                      print(f"Create view response: {json.dumps(response, default=str)}")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'ViewId': response['View']['Id'],
                          'ViewArn': response['View']['Arn']
                      }, response['View']['Id'])
                  
                  elif event['RequestType'] == 'Delete':
                      response = connect.delete_view(
                          InstanceId=instance_id,
                          ViewId=event['PhysicalResourceId']
                      )
                      print(f"Delete view response: {json.dumps(response, default=str)}")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  
                  else:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  OperationalDataTableView:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ViewCreatorFunction.Arn
      InstanceId: !Select [1, !Split ['/', !Ref ConnectInstanceArn]]
