Outputs:
  ViewId:
    Value: !GetAtt OperationalDataTableView.ViewId
  ViewArn:
    Value: !GetAtt OperationalDataTableView.ViewArn
  ViewName:
    Value: !Sub 
      - "Operational Data Table-${UUID}"
      - UUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
  WriteErrorViewId:
    Value: !GetAtt OperationalDataTableWriteErrorView.ViewId
  WriteErrorViewArn:
    Value: !GetAtt OperationalDataTableWriteErrorView.ViewArn
  WriteErrorViewName:
    Value: !Sub 
      - "Operational Data Table Write Error-${UUID}"
      - UUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
  ViewCreatorFunctionArn:
    Value: !GetAtt ViewCreatorFunction.Arn
