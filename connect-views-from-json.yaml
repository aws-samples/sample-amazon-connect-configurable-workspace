        - "Operational Data Table-${UUID}"
        - UUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Content: !Sub |
        {
          "Actions": [
            "Submit",
            "EndGuide"
          ],
          "Template": "{\"Head\":{\"Configuration\":{\"Layout\":{\"Columns\":[12]}},\"Integrations\":[{\"Name\":\"OperationalDataTable\",\"IntegrationType\":\"Tool\",\"InvocationBehavior\":{\"InvocationType\":\"IMMEDIATE\",\"RefreshBehavior\":{\"EnableRefresh\":true,\"RefreshIntervalMs\":5000}},\"Props\":{\"InputData\":{},\"ToolName\":\"aws_custom_flows__4a783629-a17b-416e-af0b-d29c978f4a20_$LATEST\"}}],\"Title\":\"Operational Patient Data Table\"},\"Body\":[{\"_id\":\"Form_1764906849193\",\"Type\":\"Form\",\"Props\":{\"HideBorder\":true},\"Content\":[{\"_id\":\"Dropdown_1765229057613\",\"Type\":\"Dropdown\",\"Props\":{\"Label\":\"Line Of Business\",\"Name\":\"Line_Of_Business\",\"DefaultValue\":[\"$.Line_Of_Business\"],\"Options\":[{\"Label\":\"Urgent Care of ASD\",\"Value\":\"Urgent Care of ASD\"},{\"Label\":\"Primary Care of ABC\",\"Value\":\"Primary Care of ABC\"},{\"Label\":\"ZXC Hospital\",\"Value\":\"ZXC Hospital\"}],\"MultiSelect\":false,\"Clearable\":true,\"Required\":false,\"Disabled\":false},\"Content\":[]},{\"_id\":\"Dropdown_1765229050843\",\"Type\":\"Dropdown\",\"Props\":{\"Label\":\"Location\",\"Name\":\"Location\",\"DefaultValue\":[\"$.Location\"],\"Options\":{\"Conditions\":[{\"Condition\":{\"Equals\":{\"ElementByKey\":\"Dropdown_1765229057613\",\"ElementByValue\":\"Urgent Care of ASD\"}},\"Result\":[{\"Label\":\"WVN\",\"Value\":\"WVN\"},{\"Label\":\"WVS\",\"Value\":\"WVS\"},{\"Label\":\"WVE\",\"Value\":\"WVE\"},{\"Label\":\"All\",\"Value\":\"All\"}],\"id\":\"0-Dropdown_1765229050843-Options\"},{\"Condition\":{\"Equals\":{\"ElementByKey\":\"Dropdown_1765229057613\",\"ElementByValue\":\"Primary Care of ABC\"}},\"Result\":[{\"Label\":\"WVN\",\"Value\":\"WVN\"},{\"Label\":\"WVS\",\"Value\":\"WVS\"},{\"Label\":\"All\",\"Value\":\"All\"}],\"id\":\"1-Dropdown_1765229050843-Options\"},{\"Condition\":{\"Equals\":{\"ElementByKey\":\"Dropdown_1765229057613\",\"ElementByValue\":\"ZXC Hospital\"}},\"Result\":[{\"Label\":\"WVW\",\"Value\":\"WVW\"},{\"Label\":\"A