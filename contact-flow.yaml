        - PrimaryValueGroupsMapperArn: !Ref PrimaryValueGroupsMapperArn
          WriteTransformArn: !Ref WriteTransformArn
          OperationalDataTableViewArn: !Ref OperationalDataTableViewArn
          OperationalDataTableWriteErrorViewArn: !Ref OperationalDataTableWriteErrorViewArn
          DataTableId: !Ref DataTableId
          PrimaryValueGroupsMapperName: !Ref PrimaryValueGroupsMapperName
          WriteTransformName: !Ref WriteTransformName
          DataTableName: !Ref DataTableName
          OperationalDataTableWriteErrorViewArn: !Ref OperationalDataTableWriteErrorViewArn
          DataTableId: !Ref DataTableId
          OperationalDataTableViewName: !Ref OperationalDataTableViewName
          OperationalDataTableWriteErrorViewName: !Ref OperationalDataTableWriteErrorViewName
          
Outputs:
  ContactFlowId:
    Description: The ID of the created contact flow
    Value: !Ref OperationalPatientContactFlow
  
  ContactFlowArn:
    Description: The ARN of the created contact flow
    Value: !GetAtt OperationalPatientContactFlow.ContactFlowArn
    
  ContactFlowName:
    Description: The name of the created contact flow
    Value: !Sub 
      - "Operational Patient Data Table Flow-${UUID}"
      - UUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
