AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon Connect Contact Flow for Operational Patient Data Table'

Parameters:
  ConnectInstanceArn:
    Type: String
    Description: Amazon Connect Instance ARN

  DataTableId:
    Type: String
    Description: Operational Patient Data Table ID
    
  DataTableName:
    Type: String
    Description: Operational Patient Data Table Name
  
  PrimaryValueGroupsMapperArn:
    Type: String
    Description: ARN of the Primary Value Groups Mapper Lambda function

  WriteTransformArn:
    Type: String
    Description: ARN of the Write Transform Lambda function
  
  OperationalDataTableViewArn:
    Type: String
    Description: ARN of the Operational Data Table View
  
  OperationalDataTableWriteErrorViewArn:
    Type: String
    Description: ARN of the Operational Data Table Write Error View
    
  OperationalDataTableViewName:
    Type: String
    Description: Name of the Operational Data Table View
    
  OperationalDataTableWriteErrorViewName:
    Type: String
    Description: Name of the Operational Data Table Write Error View
    
  PrimaryValueGroupsMapperName:
    Type: String
    Description: Name of the Primary Value Groups Mapper Lambda function
    
  WriteTransformName:
    Type: String
    Description: Name of the Write Transform Lambda function

Resources:
  OperationalPatientContactFlow:
    Type: AWS::Connect::ContactFlow
    Properties:
      InstanceArn: !Ref ConnectInstanceArn
      Name: !Sub 
        - "Operational Patient Data Table Flow-${UUID}"
        - UUID: !Select [0, !Split ['-', !Select [2, !Split ['/', !Ref 'AWS::StackId']]]]
      Type: CONTACT_FLOW
      Content: !Sub
